{% extends "base.html" %}{% block title %}{{ title }}{% endblock %}{% block content %}<section class="page-header"><div><p class="eyebrow">מסמכים</p><h1>{{ title }}</h1><p class="muted">עד 10MB. PDF, תמונות ומסמכי Office.</p></div></section><section class="panel form-panel"><form method="post" enctype="multipart/form-data" class="form-grid">{{ form.hidden_tag() }}<label class="full-field">{{ form.title.label }}{{ form.title() }}</label><label>{{ form.category.label }}{{ form.category() }}</label><label>{{ form.vendor_id.label }}{{ form.vendor_id() }}</label><label class="full-field">{{ form.file.label }}{{ form.file() }}{% for e in form.file.errors %}<small class="field-error">{{ e }}</small>{% endfor %}</label><label class="full-field">{{ form.notes.label }}{{ form.notes(rows=5) }}</label><div class="form-actions full-field"><a class="secondary-button inline" href="{{ url_for('documents.index') }}">ביטול</a>{{ form.submit(class='primary-button inline') }}</div></form></section>{% endblock %}
