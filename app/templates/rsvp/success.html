<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>תודה</title><link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}"></head><body class="rsvp-body"><main class="rsvp-shell success"><div class="success-mark">✓</div><h1>תודה, {{ guest.first_name }}!</h1><p>{% if guest.rsvp_status == 'confirmed' %}מחכים לשמוח יחד איתכם 🤍{% elif guest.rsvp_status == 'declined' %}תודה שעדכנתם. נתגעגע אליכם.{% else %}קיבלנו את העדכון ונשמח לשמוע כשתדעו.{% endif %}</p><a class="secondary-button" href="{{ url_for('rsvp.respond', token=guest.rsvp_token) }}">עדכון התשובה</a></main></body></html>
